name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Accept every Android SDK license up front so neither sdkmanager nor
      # Gradle's auto-install step ever blocks on an interactive prompt.
      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_HOME" --licenses

      # Pre-install every component the build needs. Doing this explicitly
      # (instead of relying on Gradle's auto-download) avoids the NDK/CMake
      # license prompts that previously failed the build.
      #   - platform-tools        : adb / general tooling
      #   - platforms;android-36  : compileSdk = 36
      #   - build-tools;35.0.0    : required by AGP 8.13.2
      #   - ndk;29.0.13846066     : Bcore ndkVersion
      #   - cmake;3.22.1          : app externalNativeBuild cmake
      - name: Install Android SDK components
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "ndk;29.0.13846066" \
            "cmake;3.22.1"
          echo "Installed SDK components:"
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_HOME" --list_installed

      - name: Build Release APK
        shell: bash
        run: |
          set +o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle.log
          rc=${PIPESTATUS[0]}
          echo "GRADLE_EXIT_CODE=$rc" >> "$GITHUB_ENV"
          if [ $rc -ne 0 ]; then
            echo "### Build failed" >> "$GITHUB_STEP_SUMMARY"
            tail -60 gradle.log >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $rc

      - name: Upload Gradle log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log-${{ github.sha }}
          path: gradle.log
          if-no-files-found: warn

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kail_location-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
