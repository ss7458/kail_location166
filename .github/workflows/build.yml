name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install Android SDK platform 36
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms/" 2>/dev/null || echo "No platforms dir"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-36" 2>&1 | tail -5 || echo "sdkmanager done"
          ls "$ANDROID_HOME/platforms/" 2>/dev/null

      - name: 🔍 Gradle configuration check
        shell: bash
        run: |
          set +o pipefail
          ./gradlew projects --stacktrace 2>&1 | tee config.log; rc=${PIPESTATUS[0]}
          echo "### Gradle project list" >> $GITHUB_STEP_SUMMARY
          grep -E "(Root|Project)" config.log | head -10 >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          if [ $rc -ne 0 ]; then
            echo "### CONFIGURATION FAILED (rc=$rc)" >> $GITHUB_STEP_SUMMARY
            # Dump the FULL config.log into step summary (it's small, ~3KB)
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat config.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            # Emit ::error with the key lines
            grep -i -E "(What went wrong|Cause:|Could not resolve|No cached|from repository|in repository)" config.log | head -10 | while read line; do
              echo "::error title=Gradle Err::$line"
            done
            cat config.log > gradle.log
          fi
          exit $rc

      - name: 📦 Build APK
        shell: bash
        run: |
          set +o pipefail
          ./gradlew assembleRelease --stacktrace 2>&1 | tee gradle.log; rc=${PIPESTATUS[0]}
          echo "GRADLE_EXIT_CODE=$rc" >> $GITHUB_ENV
          echo "### Gradle build output (error context)" >> $GITHUB_STEP_SUMMARY
          grep -n -i -E "(error|FAILED|Exception|BUILD|What went wrong|Cause|cannot|could not|not found)" gradle.log | tail -30 >> $GITHUB_STEP_SUMMARY
          echo "--- last 20 lines ---" >> $GITHUB_STEP_SUMMARY
          tail -20 gradle.log >> $GITHUB_STEP_SUMMARY
          exit $rc

      - name: Upload Gradle build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log-${{ github.sha }}
          path: "*.log"
          if-no-files-found: warn

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kail_location-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
