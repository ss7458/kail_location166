name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 👁️ Diagnose Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "No platforms dir"
          ls -la "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "No build-tools dir"
          ls -la "$ANDROID_HOME/ndk/" 2>/dev/null || echo "No ndk dir"
          ls -la "$ANDROID_HOME/cmake/" 2>/dev/null || echo "No cmake dir"
          which cmake 2>/dev/null && cmake --version || echo "cmake not in PATH"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list --sdk_root=$ANDROID_HOME 2>/dev/null | grep "platforms;" | tail -5 || echo "Cannot list sdkmanager"

      - name: ✅ Accept Android SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses 2>&1 | tail -3 || echo "sdkmanager license step done"

      - name: Build Debug APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kail_location-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
